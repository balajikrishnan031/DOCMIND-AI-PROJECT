<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMind AI — Portal Sign In</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6 & Google Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body.kinto-login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f7f4ee;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1c1917;
            margin: 0;
            padding: 2rem 1rem;
        }

        .kinto-login-card {
            background: #ffffff;
            border: 1px solid #e2dacd;
            border-radius: 28px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
        }

        .kinto-login-brand {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            color: #1c1917;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .kinto-login-sub {
            text-align: center;
            font-size: 0.92rem;
            color: #57534e;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .nav-pills-kinto {
            background: #f7f4ee;
            border: 1px solid #e2dacd;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
        }

        .nav-pills-kinto .nav-link {
            color: #57534e;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 8px;
            padding: 0.6rem 1rem;
            transition: all 0.2s ease;
        }

        .nav-pills-kinto .nav-link.active {
            background: #18181b;
            color: #ffffff;
        }

        .form-control-kinto {
            background: #f7f4ee;
            border: 1px solid #e2dacd;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #1c1917;
            font-size: 0.95rem;
        }

        .form-control-kinto:focus {
            background: #ffffff;
            border-color: #1c1917;
            box-shadow: none;
            color: #1c1917;
        }

        .btn-kinto-submit {
            background: #18181b;
            color: #ffffff;
            font-weight: 700;
            border-radius: 12px;
            padding: 0.85rem;
            width: 100%;
            border: none;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .btn-kinto-submit:hover {
            background: #27272a;
        }

        .kinto-role-badge-group {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .role-badge-chip {
            background: #f7f4ee;
            border: 1px solid #e2dacd;
            color: #57534e;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.3rem 0.75rem;
            border-radius: 30px;
        }
    </style>
</head>
<body class="kinto-login-page">

    <div class="kinto-login-card">
        <a href="/" class="text-decoration-none">
            <div class="kinto-login-brand">
                <i class="fa-solid fa-brain"></i> DocMind AI
            </div>
        </a>
        <div class="kinto-login-sub">Intelligent Document Organizer & Educational Assistant</div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Tab Headers -->
        <ul class="nav nav-pills nav-justified nav-pills-kinto mb-4" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-login" data-bs-toggle="pill" data-bs-target="#panel-login" type="button" role="tab" aria-selected="true">
                    Student / Candidate
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-register" data-bs-toggle="pill" data-bs-target="#panel-register" type="button" role="tab" aria-selected="false">
                    Faculty / Admin
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="pills-tabContent">
            <!-- Student Login Form -->
            <div class="tab-pane fade show active" id="panel-login" role="tabpanel">
                <form action="{{ url_for('login') }}" method="POST">
                    <input type="hidden" name="action" value="login">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold small text-secondary">Username or Email</label>
                        <input type="text" name="username" class="form-control form-control-kinto" placeholder="Enter student username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label font-weight-bold small text-secondary">Password</label>
                        <input type="password" name="password" class="form-control form-control-kinto" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn-kinto-submit mb-3">Sign In to Student Portal <i class="fa-solid fa-arrow-right ms-1"></i></button>
                </form>
            </div>

            <!-- Faculty Register Form -->
            <div class="tab-pane fade" id="panel-register" role="tabpanel">
                <form action="{{ url_for('login') }}" method="POST">
                    <input type="hidden" name="action" value="register">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold small text-secondary">Faculty Username</label>
                        <input type="text" name="username" class="form-control form-control-kinto" placeholder="Choose username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold small text-secondary">Institution Email</label>
                        <input type="email" name="email" class="form-control form-control-kinto" placeholder="prof@university.edu" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label font-weight-bold small text-secondary">Password</label>
                        <input type="password" name="password" class="form-control form-control-kinto" placeholder="Create password" required>
                    </div>
                    <button type="submit" class="btn-kinto-submit mb-3">Create Faculty Account <i class="fa-solid fa-user-plus ms-1"></i></button>
                </form>
            </div>
        </div>

        <div class="kinto-role-badge-group">
            <span class="role-badge-chip">Std 1-12</span>
            <span class="role-badge-chip">B.E. Sem 1-8</span>
            <span class="role-badge-chip">HOD / Dean</span>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/bootstrap.bundle.min.js"></script>
</body>
</html>
