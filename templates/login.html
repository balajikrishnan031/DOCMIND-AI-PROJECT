<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to DocMind AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Custom Style CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(rgba(5, 7, 10, 0.7) 0%, rgba(5, 7, 10, 0.96) 100%), url('/static/assets/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
        }
        .login-wrapper {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .login-brand {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #ffffff 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="glass-panel p-4 login-card">
            <div class="login-brand">
                <i class="fa-solid fa-brain me-2 text-cyan"></i>DocMind AI
            </div>
            
            <!-- Tab Headers -->
            <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist" style="background: rgba(255,255,255,0.02); padding: 5px; border-radius: 8px;">
                <li class="nav-item" role="presentation">
                    <button class="nav-link text-white active" id="tab-login" data-bs-toggle="pill" data-bs-target="#panel-login" type="button" role="tab" aria-selected="true">
                        <i class="fa-solid fa-right-to-bracket me-2"></i>Login
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link text-white" id="tab-register" data-bs-toggle="pill" data-bs-target="#panel-register" type="button" role="tab" aria-selected="false">
                        <i class="fa-solid fa-user-plus me-2"></i>Register
                    </button>
                </li>
            </ul>

            <!-- Form Content -->
            <div class="tab-content" id="pills-tabContent">
                <!-- Login Form -->
                <div class="tab-pane fade show active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Username or Email</label>
                            <input type="text" name="username_or_email" class="form-control form-control-custom" placeholder="Enter username/email" required autocomplete="username">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small">Password</label>
                            <input type="password" name="password" class="form-control form-control-custom" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 py-2">
                            Sign In <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>
                    </form>
                </div>
                
                <!-- Registration Form -->
                <div class="tab-pane fade" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Username</label>
                            <input type="text" name="username" class="form-control form-control-custom" placeholder="Choose username" required autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-custom" placeholder="name@domain.com" required autocomplete="email">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small">Password</label>
                            <input type="password" name="password" class="form-control form-control-custom" placeholder="Create password" required autocomplete="new-password">
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 py-2">
                            Create Account <i class="fa-solid fa-user-plus ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Validation/Feedback Alerts -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{% if category == 'success' %}success{% else %}danger{% endif %} bg-dark border-{% if category == 'success' %}success{% else %}danger{% endif %} text-white mt-4 small mb-0" role="alert">
                            <i class="fa-solid {% if category == 'success' %}fa-circle-check text-success{% else %}fa-circle-exclamation text-danger{% endif %} me-2"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Custom Pill toggle active color behavior override
        const triggerTabList = [].slice.call(document.querySelectorAll('#pills-tab button'))
        triggerTabList.forEach(function (triggerEl) {
            triggerEl.addEventListener('click', function (event) {
                triggerTabList.forEach(t => t.classList.remove('bg-primary', 'shadow-sm'));
                triggerEl.classList.add('bg-primary', 'shadow-sm');
            })
        });
        
        // Initial setup
        document.getElementById('tab-login').click();
    </script>
</body>
</html>
